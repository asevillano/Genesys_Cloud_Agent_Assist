<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Genesys Cloud — Agent Desktop (Simulator)</title>
  <link rel="stylesheet" href="/static/styles.css" />
</head>
<body>
  <header class="topbar">
    <div class="logo">◆ Genesys Cloud Simulator</div>
    <span class="pill" id="connStatus"><span class="status-dot" id="dot"></span><span id="connText">disconnected</span></span>
    <div class="spacer"></div>
    <span class="pill" id="convPill">conversation: —</span>
  </header>

  <main class="layout">
    <aside class="call-panel">
      <h2>Interaction</h2>
      <div class="card">
        <div class="row" style="margin-bottom:8px">
          <label style="flex:1">Agent (Foundry)</label>
          <select id="agentSelect" style="flex:1.2"></select>
        </div>
        <div class="row" style="margin-bottom:8px">
          <label style="flex:1">Mic device</label>
          <select id="micSelect" style="flex:1.2"></select>
        </div>
        <div class="row" style="margin-bottom:8px">
          <label style="flex:1">Language</label>
          <input id="lang" value="es" style="flex:1.2" />
        </div>
        <div class="row">
          <button id="btnStart" class="primary" style="flex:1">▶ Start call</button>
          <button id="btnEnd" class="danger" disabled>■ End</button>
        </div>
      </div>

      <h2>Push to talk</h2>
      <div class="card">
        <button id="pttCustomer" class="ptt customer" disabled>🎤 Hold — Customer</button>
        <button id="pttAgent" class="ptt agent" disabled>🎤 Hold — Agent</button>
        <div style="font-size:11px;color:var(--muted);margin-top:8px">
          Hold the button while speaking. Released = silence on that channel.
          Both channels travel in the same AudioHook frame (interleaved µ-law 8 kHz).
        </div>
      </div>

      <h2>Wrap-up</h2>
      <div class="card">
        <button id="btnWrapup" disabled style="width:100%">📝 Generate summary</button>
      </div>

      <h2>Log</h2>
      <div class="card" style="padding:0">
        <div id="log" class="log"></div>
      </div>
    </aside>

    <section class="assist-frame">
      <div class="frame-bar">
        <span>🧩 Agent Assist (custom Client App)</span>
        <span class="spacer" style="flex:1"></span>
        <span id="iframeUrl" style="opacity:0.6"></span>
      </div>
      <iframe id="assist" src="/agent-assist"></iframe>
    </section>
  </main>

  <script src="/static/simulator.js"></script>
</body>
</html>
