<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Agent Assist</title>
  <link rel="stylesheet" href="/static/styles.css" />
</head>
<body>
  <div class="aa-layout">
    <div class="aa-head">
      <span class="title">🧠 Agent Assist</span>
      <span class="pill" id="convPill">conversation: —</span>
      <span class="spacer" style="flex:1"></span>
      <span class="pill" id="status"><span class="status-dot" id="dot"></span><span id="statusText">waiting…</span></span>
    </div>

    <div class="aa-grid">
      <div class="aa-col">
        <header>Live transcript</header>
        <div class="body" id="transcript"></div>
      </div>
      <div class="aa-col">
        <header>Suggestions & summary</header>
        <div class="body" id="suggestions"></div>
      </div>
    </div>

    <div class="aa-foot">
      <span style="font-size:11px;color:var(--muted)">
        Streaming via WebSocket. Customer turns trigger the Foundry agent.
      </span>
    </div>
  </div>

  <script src="/static/agent-assist.js"></script>
</body>
</html>
